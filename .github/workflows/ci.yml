name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://sakekeep:sakekeep@127.0.0.1:54321/sakekeep
      S3_ENDPOINT: http://127.0.0.1:19000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: sakekeep
      S3_SECRET_ACCESS_KEY: sakekeep-local-only
      S3_BUCKET: sakekeep
      SHARE_TOKEN_SECRET: sakekeep-ci-share-token-secret-with-at-least-thirty-two-characters
      APP_ORIGIN: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: docker compose up -d --wait
      - run: bun run setup:icc
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bunx playwright install --with-deps chromium
      - run: bun run verify
      - if: always()
        run: docker compose logs --no-color
